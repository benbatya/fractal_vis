<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mandelbrot</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
    canvas { display: block; width: 100%; height: 100%; cursor: grab; }
    canvas:active { cursor: grabbing; }
    #fps, #draw-time {
      position: fixed;
      left: 12px;
      color: #fff;
      font: 600 13px/1.5 monospace;
      text-shadow: 0 1px 3px #000, 0 0 6px #000;
      pointer-events: none;
      user-select: none;
    }
    #fps { top: 12px; }
    #draw-time { top: 36px; }
#controls {
      position: fixed;
      bottom: 12px;
      right: 12px;
      display: flex;
      flex-direction: column;
      align-items: flex-end;
      gap: 4px;
    }
    #pause-btn, #reset-view-btn {
      font: 600 13px/1.5 monospace;
      background: rgba(0,0,0,0.5);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.4);
      padding: 2px 10px;
      cursor: pointer;
      border-radius: 3px;
    }
    #pause-btn:hover, #reset-view-btn:hover { background: rgba(255,255,255,0.15); }
    #tsec-display {
      color: #fff;
      font: 600 13px/1.5 monospace;
      text-shadow: 0 1px 3px #000, 0 0 6px #000;
      pointer-events: none;
      user-select: none;
    }
    #tsec-slider {
      width: 140px;
      cursor: pointer;
    }
    #tsec-slider:disabled { opacity: 0.4; cursor: default; }
    #view-info {
      color: #fff;
      font: 600 11px/1.4 monospace;
      text-shadow: 0 1px 3px #000, 0 0 6px #000;
      pointer-events: none;
      user-select: none;
      text-align: right;
      white-space: pre;
    }
  </style>
  <script type="module" crossorigin src="./assets/index-JtqpDKwc.js"></script>
</head>
<body>
  <canvas id="glcanvas"></canvas>
  <div id="fps"></div>
  <div id="draw-time"></div>
  <div id="controls">
    <button id="pause-btn">Pause</button>
    <button id="reset-view-btn">Reset View</button>
    <div id="tsec-display"></div>
    <input id="tsec-slider" type="range" min="0" max="1" step="0.0001" value="0" disabled />
    <div id="view-info"></div>
  </div>
</body>
</html>
